openapi: 3.1.0
info:
  title: Business Service API
  version: 0.1.0
  description: Template for service APIs governed by AI-SDD.
servers:
  - url: https://api.example.com
paths:
  /work-orders/{workOrderId}:
    get:
      summary: Get business entity details
      operationId: getWorkOrder
      tags:
        - WorkOrder
      parameters:
        - name: workOrderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business entity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Business entity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    WorkOrder:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          type: string
          enum:
            - created
            - assigned
            - in_progress
            - completed
            - cancelled
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
